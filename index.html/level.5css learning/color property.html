<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color properties</title>
    <link rel="stylesheet" href="color.css">
</head>
<body>
    <!--this is foreground color property-->
   <h1>this is my first headline</h1>
    <p>this is a simple & normal paragraph</p>

    <!--this is background color property-->
     <button>poked me</button>

     <!--this is an id selector-->
     <h1 id="heading1">this is heading first</h1>
     <h1 id="heading2">this is heading second</h1>
     <h1 id="heading3">this is heading third</h1>

     <!--this is a class selector-->
     <div class="myclass">this is my class</div>
    <div class="myclass">this is my second class</div>


     

    


</body>
</html>
